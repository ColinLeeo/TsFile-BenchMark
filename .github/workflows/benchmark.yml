name: benchmark

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to post benchmark comment"
        required: false
        default: "2"
      skip_benchmark:
        description: "Skip docker benchmark and only run report on existing result/"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  issues: write

jobs:
  run-benchmark:
    runs-on: [self-hosted, linux]
    timeout-minutes: 180

    env:
      GITHUB_TOKEN: ${{ secrets.BENCHMARK_GITHUB_TOKEN }}
      ASSET_REPO: ${{ vars.ASSET_REPO }}
      ISSUE_REPO: ${{ vars.ISSUE_REPO }}
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || vars.ISSUE_NUMBER || '2' }}
      TSFILE_GIT_URL: ${{ vars.TSFILE_GIT_URL || 'https://github.com/apache/tsfile.git' }}
      TSFILE_DIR: ${{ runner.temp }}/tsfile-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout benchmark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib numpy

      - name: Verify Docker is available
        run: |
          docker --version

      - name: Run benchmark in Docker
        if: ${{ github.event.inputs.skip_benchmark != 'true' }}
        run: |
          chmod +x scripts/start_benchmark_docker.sh
          ./scripts/start_benchmark_docker.sh

      - name: Generate report + archive + sqlite + trend + push + issue comment
        run: |
          python scripts/report_benchmark_result.py
